<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Premium Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav id="navbar">
        <div class="logo">GALLERY<span>PRO</span></div>
        <div class="nav-links">
            <a href="#">Hem</a>
            <a href="#">Galleri</a>
            <button id="theme-btn">🌙</button>
        </div>
    </nav>

    <header class="hero">
        <h1>Välkommen till min värld</h1>
        <p>Utforska mina senaste projekt och fångade ögonblick.</p>
        <button class="cta-btn">Se mer</button>
    </header>


    <section class="wheel-section">
    <h2>Vad ska hända nu?</h2>
    <div class="wheel-container">
        <canvas id="wheel" width="400" height="400"></canvas>
        <div id="wheel-pointer">▼</div>
    </div>
    <button id="spin-btn">SNURRA HJULET!</button>
    <h3 id="result-text">Klicka för att se vad som händer...</h3>
</section>
    <main>
    <section class="gallery-columns">
        <div class="card"><img src="img/pic1.png" alt="Bild 1" class="gallery-img"></div>
        <div class="card"><img src="img/pic2.png" alt="Bild 2" class="gallery-img"></div>
        <div class="card"><img src="img/pic3.png" alt="Bild 3" class="gallery-img"></div>
        <div class="card"><img src="img/pic4.png" alt="Bild 4" class="gallery-img"></div>
        <div class="card"><img src="img/pic5.png" alt="Bild 5" class="gallery-img"></div>
    </section>
</main>

    <div id="modal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="img-expanded">
        <div id="caption"></div>
    </div>

    <footer>
        <p>&copy; 2026 Skapad med ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
